plugins {
    id 'application'
    id 'java'
}

application {
    mainClass = 'com.audiosearch.AudioSearchApp'
    applicationName = 'audiosearch'
}

group = 'com.audiosearch'
version = '1.0.0'

repositories {
    mavenCentral()
}

def lc4jVersion = "1.13.0"
dependencies {
    implementation "dev.langchain4j:langchain4j:${lc4jVersion}"
    implementation "dev.langchain4j:langchain4j-open-ai:${lc4jVersion}"

    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.google.code.gson:gson:2.11.0'
    implementation 'org.slf4j:slf4j-simple:2.0.16'
}

task fatJar(type: Jar) {
    manifest {
        attributes['Main-Class'] = application.mainClass
    }
    from sourceSets.main.output
    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath.filter { it.name.endsWith('jar') }.map { zipTree(it) }
    }
    duplicatesStrategy = 'EXCLUDE'
    archiveFileName = 'audiosearch.jar'
}